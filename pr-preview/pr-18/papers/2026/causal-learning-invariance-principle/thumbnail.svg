<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <!-- three environments as nested frames sharing one invariant graph -->
  <g stroke="#6f6f78" stroke-width="1.2" fill="none" opacity="0.55">
    <rect x="120" y="80" width="360" height="220" rx="10"/>
    <rect x="150" y="105" width="300" height="170" rx="10"/>
    <rect x="180" y="130" width="240" height="120" rx="10"/>
  </g>
  <!-- invariant causal graph -->
  <g stroke="#026234" stroke-width="2" fill="none">
    <path d="M240 175 L300 150"/>
    <path d="M240 175 L300 215"/>
    <path d="M300 150 L360 190"/>
    <path d="M300 215 L360 190"/>
  </g>
  <g fill="#fbfaf7">
    <circle cx="240" cy="175" r="7"/>
    <circle cx="300" cy="150" r="7"/>
    <circle cx="300" cy="215" r="7"/>
    <circle cx="360" cy="190" r="7"/>
  </g>
  <g fill="#026234">
    <circle cx="300" cy="150" r="3.2"/>
    <circle cx="360" cy="190" r="3.2"/>
  </g>
</svg>
