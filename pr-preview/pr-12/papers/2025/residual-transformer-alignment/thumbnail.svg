<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <!-- residual stream: a vertical spine carrying additive unit contributions -->
  <line x1="300" y1="40" x2="300" y2="340" stroke="#6f6f78" stroke-width="2" opacity="0.5"/>
  <!-- residual units feeding in (attention heads / MLPs), most are noise (faint grey) -->
  <g stroke="#6f6f78" stroke-width="1.2" opacity="0.55">
    <line x1="150" y1="80"  x2="300" y2="110"/>
    <line x1="455" y1="95"  x2="300" y2="125"/>
    <line x1="135" y1="160" x2="300" y2="170"/>
    <line x1="470" y1="175" x2="300" y2="185"/>
    <line x1="150" y1="250" x2="300" y2="225"/>
    <line x1="460" y1="270" x2="300" y2="240"/>
    <line x1="170" y1="320" x2="300" y2="290"/>
  </g>
  <!-- two task-relevant, specialized units amplified in rust -->
  <g stroke="#026234" stroke-width="2.6">
    <line x1="120" y1="120" x2="300" y2="150"/>
    <line x1="480" y1="225" x2="300" y2="205"/>
  </g>
  <!-- faint unit tips (noise) -->
  <g fill="#6f6f78">
    <circle cx="150" cy="80"  r="3"/>
    <circle cx="455" cy="95"  r="3"/>
    <circle cx="135" cy="160" r="3"/>
    <circle cx="470" cy="175" r="3"/>
    <circle cx="150" cy="250" r="3"/>
    <circle cx="460" cy="270" r="3"/>
    <circle cx="170" cy="320" r="3"/>
  </g>
  <!-- amplified unit tips (the gold panned from the residual) -->
  <g fill="#026234">
    <circle cx="120" cy="120" r="6"/>
    <circle cx="480" cy="225" r="6"/>
  </g>
  <!-- the aligned output at the bottom of the stream -->
  <circle cx="300" cy="340" r="7" fill="#fbfaf7"/>
  <!-- spectral scaling: small bars along the stream, a few tall (kept) most short (washed out) -->
  <g fill="#fbfaf7">
    <rect x="312" y="90"  width="6" height="30"/>
    <rect x="322" y="105" width="6" height="15"/>
    <rect x="332" y="112" width="6" height="8"/>
    <rect x="342" y="114" width="6" height="6"/>
  </g>
</svg>
