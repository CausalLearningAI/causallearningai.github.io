<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <!-- pipeline: X -> Z -> S* -> policy -->
  <g font-family="JetBrains Mono, monospace" fill="#fbfaf7">
    <text x="70"  y="200" font-size="34" text-anchor="middle">X</text>
    <text x="240" y="200" font-size="34" text-anchor="middle">Z</text>
    <text x="430" y="200" font-size="30" text-anchor="middle">S&#8902;</text>
  </g>
  <g stroke="#026234" stroke-width="2.5" fill="none">
    <path d="M100 190 L205 190" marker-end="url(#a)"/>
    <path d="M275 190 L390 190" marker-end="url(#a)"/>
    <!-- feedback loop: update policy -->
    <path d="M455 165 Q470 70 290 70 Q90 70 78 168" stroke-dasharray="7 6"/>
  </g>
  <!-- dictionary atoms scattered around Z -->
  <g fill="#6f6f78">
    <circle cx="240" cy="135" r="3"/><circle cx="215" cy="250" r="3"/>
    <circle cx="270" cy="245" r="3"/><circle cx="200" cy="155" r="3"/>
    <circle cx="285" cy="150" r="3"/><circle cx="225" cy="290" r="3"/>
  </g>
  <!-- selected principal proxies -->
  <g fill="#026234">
    <circle cx="430" cy="150" r="4"/><circle cx="430" cy="240" r="4"/>
  </g>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#026234"/>
    </marker>
  </defs>
  <text x="300" y="340" font-family="JetBrains Mono, monospace" font-size="15"
        fill="#6f6f78" text-anchor="middle">controlled experiment &#8594; represent &#8594; identify</text>
</svg>
