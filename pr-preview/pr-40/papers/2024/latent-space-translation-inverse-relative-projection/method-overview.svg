<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430">
  <rect width="980" height="430" fill="#16161d"/>
  <style>
    .lab  { font-family: 'JetBrains Mono', monospace; fill: #fbfaf7; }
    .mut  { font-family: 'JetBrains Mono', monospace; fill: #9aa0aa; }
    .it   { font-family: 'Newsreader', serif; font-style: italic; fill: #fbfaf7; }
  </style>

  <!-- ============ Source absolute space X ============ -->
  <rect x="40" y="120" width="190" height="190" rx="10" fill="none" stroke="#9aa0aa" stroke-width="1.5"/>
  <text x="135" y="108" text-anchor="middle" class="it" font-size="20">source space  X</text>
  <g fill="#9aa0aa">
    <circle cx="90"  cy="170" r="6"/>
    <circle cx="150" cy="150" r="6"/>
    <circle cx="120" cy="220" r="6"/>
    <circle cx="185" cy="240" r="6"/>
    <circle cx="80"  cy="270" r="6"/>
  </g>
  <!-- source anchors -->
  <g fill="none" stroke="#c8b88a" stroke-width="2">
    <circle cx="150" cy="150" r="11"/>
    <circle cx="120" cy="220" r="11"/>
  </g>
  <text x="135" y="332" text-anchor="middle" class="mut" font-size="12">anchors A_X (in correspondence)</text>

  <!-- ============ Relative bridge Z ============ -->
  <circle cx="490" cy="215" r="70" fill="#16161d" stroke="#2f9e6b" stroke-width="2"/>
  <text x="490" y="208" text-anchor="middle" class="it" font-size="22">relative</text>
  <text x="490" y="234" text-anchor="middle" class="it" font-size="22">space  Z</text>
  <text x="490" y="120" text-anchor="middle" class="mut" font-size="13">angle-preserving · scale-free</text>
  <text x="490" y="320" text-anchor="middle" class="mut" font-size="13">X_rel &#8776; Y_rel  (semantic Rosetta stone)</text>

  <!-- ============ Target absolute space Y ============ -->
  <rect x="750" y="120" width="190" height="190" rx="10" fill="none" stroke="#c8b88a" stroke-width="1.5"/>
  <text x="845" y="108" text-anchor="middle" class="it" font-size="20">target space  Y</text>
  <g fill="#c8b88a">
    <circle cx="800" cy="160" r="6"/>
    <circle cx="870" cy="180" r="6"/>
    <circle cx="820" cy="240" r="6"/>
    <circle cx="895" cy="255" r="6"/>
    <circle cx="790" cy="285" r="6"/>
  </g>
  <g fill="none" stroke="#c8b88a" stroke-width="2">
    <circle cx="800" cy="160" r="11"/>
    <circle cx="820" cy="240" r="11"/>
  </g>
  <text x="845" y="332" text-anchor="middle" class="mut" font-size="12">anchors A_Y (in correspondence)</text>

  <!-- ============ Encode arrow X -> Z ============ -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#fbfaf7"/>
    </marker>
  </defs>
  <line x1="240" y1="200" x2="412" y2="205" stroke="#fbfaf7" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="320" y="180" text-anchor="middle" class="lab" font-size="15">relative projection</text>
  <text x="320" y="232" text-anchor="middle" class="mut" font-size="14">X_rel = X · A_X&#7488;</text>

  <!-- ============ Decode arrow Z -> Y (the inverse, our contribution) ============ -->
  <line x1="568" y1="205" x2="740" y2="200" stroke="#2f9e6b" stroke-width="2.2" marker-end="url(#arr)"/>
  <text x="655" y="180" text-anchor="middle" class="lab" font-size="15">inverse projection</text>
  <text x="655" y="232" text-anchor="middle" class="mut" font-size="14">Y_abs = X_rel · (A_Y&#7488;)&#8315;&#185;</text>

  <!-- caption strip -->
  <text x="490" y="395" text-anchor="middle" class="mut" font-size="13">each absolute space is encoded into &#8212; and decoded out of &#8212; the bridge independently, with no joint access</text>
</svg>
