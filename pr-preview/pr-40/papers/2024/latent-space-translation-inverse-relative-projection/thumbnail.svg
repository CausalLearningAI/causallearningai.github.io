<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <!-- Editor schematic: absolute space X -> relative bridge Z -> absolute space Y -->
  <!-- absolute space X (left) -->
  <g fill="#9aa0aa">
    <circle cx="70"  cy="110" r="6"/>
    <circle cx="95"  cy="175" r="6"/>
    <circle cx="62"  cy="240" r="6"/>
    <circle cx="115" cy="300" r="6"/>
    <circle cx="120" cy="90"  r="6"/>
  </g>
  <text x="88" y="55" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="16" fill="#9aa0aa" font-style="italic">X</text>
  <!-- relative bridge Z (centre) -->
  <circle cx="300" cy="200" r="34" fill="#16161d" stroke="#2f9e6b" stroke-width="2"/>
  <text x="300" y="206" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="22" fill="#fbfaf7" font-style="italic">Z</text>
  <text x="300" y="355" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" letter-spacing="2" fill="#fbfaf7">RELATIVE BRIDGE</text>
  <!-- absolute space Y (right) -->
  <g fill="#c8b88a">
    <circle cx="490" cy="100" r="6"/>
    <circle cx="538" cy="160" r="6"/>
    <circle cx="505" cy="225" r="6"/>
    <circle cx="540" cy="290" r="6"/>
    <circle cx="480" cy="305" r="6"/>
  </g>
  <text x="514" y="55" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="16" fill="#c8b88a" font-style="italic">Y</text>
  <!-- X -> Z : relative projection (encode) -->
  <g stroke="#9aa0aa" stroke-width="1.6" opacity="0.8">
    <line x1="120" y1="90"  x2="270" y2="190"/>
    <line x1="95"  y1="175" x2="268" y2="200"/>
    <line x1="62"  y1="240" x2="270" y2="212"/>
  </g>
  <text x="190" y="150" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#9aa0aa">A&#8339;</text>
  <!-- Z -> Y : inverse relative projection (decode) -->
  <g stroke="#c8b88a" stroke-width="1.6" opacity="0.8">
    <line x1="332" y1="190" x2="490" y2="100"/>
    <line x1="334" y1="200" x2="538" y2="160"/>
    <line x1="332" y1="212" x2="505" y2="225"/>
  </g>
  <text x="410" y="150" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#c8b88a">(A&#7527;&#7488;)&#8315;&#185;</text>
</svg>
