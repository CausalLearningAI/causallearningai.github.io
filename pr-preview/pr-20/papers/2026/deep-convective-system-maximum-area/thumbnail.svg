    <path d="M210 200 q-14 -16 4 -26 q12 -16 28 -5 q19 -8 24 10 q16 9 3 24 q-5 19 -25 13 q-21 4 -34 -17 Z"/>
  </g>
  <g fill="#fcfbf8">
