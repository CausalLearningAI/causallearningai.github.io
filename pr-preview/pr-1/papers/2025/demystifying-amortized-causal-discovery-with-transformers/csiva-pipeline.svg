<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <rect width="900" height="300" fill="#fbfaf7"/>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#16161d"/>
    </marker>
  </defs>
  <g font-family="Inter, sans-serif" font-size="13" fill="#16161d">

    <!-- Step 1: synthetic training datasets -->
    <rect x="30" y="90" width="150" height="120" rx="6" fill="none" stroke="#16161d" stroke-width="1.5"/>
    <text x="105" y="78" text-anchor="middle" fill="#6f6f78" font-size="12">synthetic SCMs</text>
    <g font-family="Georgia, serif" font-style="italic" fill="#16161d" font-size="13">
      <text x="105" y="120" text-anchor="middle">X &#8594; Y</text>
      <text x="105" y="150" text-anchor="middle">datasets</text>
      <text x="105" y="180" text-anchor="middle">+ true graph</text>
    </g>

    <line x1="180" y1="150" x2="240" y2="150" stroke="#16161d" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- Step 2: CSIvA transformer (alternating attention) -->
    <rect x="240" y="70" width="220" height="160" rx="6" fill="none" stroke="#026234" stroke-width="2"/>
    <text x="350" y="58" text-anchor="middle" fill="#026234" font-size="13" font-family="monospace">CSIvA transformer</text>
    <text x="350" y="105" text-anchor="middle" fill="#16161d">encoder: alternating</text>
    <text x="350" y="123" text-anchor="middle" fill="#16161d">attention over</text>
    <text x="350" y="141" text-anchor="middle" fill="#6f6f78" font-size="12">samples &amp; attributes</text>
    <line x1="270" y1="158" x2="430" y2="158" stroke="#e4e0d8" stroke-width="1.2"/>
    <text x="350" y="180" text-anchor="middle" fill="#16161d">autoregressive decoder</text>
    <text x="350" y="198" text-anchor="middle" fill="#6f6f78" font-size="12">predicts adjacency &#x00C2;</text>

    <line x1="460" y1="150" x2="520" y2="150" stroke="#16161d" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- Step 3: predicted graph on test data -->
    <rect x="520" y="90" width="150" height="120" rx="6" fill="none" stroke="#16161d" stroke-width="1.5"/>
    <text x="595" y="78" text-anchor="middle" fill="#6f6f78" font-size="12">test dataset</text>
    <g font-family="Georgia, serif" font-style="italic">
      <circle cx="565" cy="150" r="16" fill="none" stroke="#16161d" stroke-width="1.4"/>
      <text x="565" y="155" text-anchor="middle" font-size="14">X</text>
      <circle cx="625" cy="150" r="16" fill="none" stroke="#16161d" stroke-width="1.4"/>
      <text x="625" y="155" text-anchor="middle" font-size="14">Y</text>
    </g>
    <line x1="581" y1="150" x2="606" y2="150" stroke="#026234" stroke-width="2" marker-end="url(#arr)"/>
    <text x="595" y="195" text-anchor="middle" fill="#6f6f78" font-size="12">predicted direction</text>

    <!-- prior annotation -->
    <text x="105" y="245" text-anchor="middle" fill="#026234" font-size="12" font-family="monospace">training distribution = implicit prior</text>
    <path d="M105 252 H595" stroke="#026234" stroke-width="1" stroke-dasharray="4 4" opacity="0.6"/>
    <text x="595" y="270" text-anchor="middle" fill="#6f6f78" font-size="11">identifiable only within the class seen in training</text>
  </g>
</svg>
