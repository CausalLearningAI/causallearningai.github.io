<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <rect width="900" height="360" fill="#fbfaf7"/>

  <!-- latent causal variables Z -->
  <g font-family="Newsreader, serif" font-size="18" fill="#16161d">
    <circle cx="180" cy="90" r="26" fill="#fbfaf7" stroke="#16161d" stroke-width="1.8"/>
    <text x="180" y="96" text-anchor="middle">Z₁</text>
    <circle cx="330" cy="90" r="26" fill="#fbfaf7" stroke="#16161d" stroke-width="1.8"/>
    <text x="330" y="96" text-anchor="middle">Z₂</text>
    <circle cx="480" cy="90" r="26" fill="#fbfaf7" stroke="#16161d" stroke-width="1.8"/>
    <text x="480" y="96" text-anchor="middle">Z₃</text>
  </g>

  <!-- causal edges among latents -->
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6f6f78"/>
    </marker>
    <marker id="arrowred" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#026234"/>
    </marker>
  </defs>
  <g stroke="#6f6f78" stroke-width="1.6" fill="none" marker-end="url(#arrow)">
    <line x1="206" y1="90" x2="298" y2="90"/>
    <line x1="356" y1="90" x2="448" y2="90"/>
  </g>
  <text x="60" y="96" font-family="monospace" font-size="13" fill="#6f6f78">latent</text>

  <!-- entangled observable X -->
  <ellipse cx="330" cy="200" rx="190" ry="34" fill="none" stroke="#16161d" stroke-width="1.6" stroke-dasharray="7 5"/>
  <text x="330" y="206" text-anchor="middle" font-family="Newsreader, serif" font-size="18" fill="#16161d">X = f(Z₁, Z₂, Z₃)  (observable)</text>

  <!-- mixing edges latent -> X -->
  <g stroke="#6f6f78" stroke-width="1.3" fill="none" opacity="0.7">
    <line x1="180" y1="116" x2="260" y2="170"/>
    <line x1="330" y1="116" x2="330" y2="166"/>
    <line x1="480" y1="116" x2="400" y2="170"/>
  </g>

  <!-- learned measurements Z-hat -->
  <g font-family="Newsreader, serif" font-size="16" fill="#16161d">
    <circle cx="180" cy="300" r="26" fill="#fbfaf7" stroke="#026234" stroke-width="2"/>
    <text x="180" y="306" text-anchor="middle" fill="#026234">Ẑ_A₁</text>
    <circle cx="480" cy="300" r="26" fill="#fbfaf7" stroke="#026234" stroke-width="2"/>
    <text x="480" y="306" text-anchor="middle" fill="#026234">Ẑ_A₂</text>
  </g>
  <text x="60" y="306" font-family="monospace" font-size="13" fill="#026234">measured</text>

  <!-- encoder edges X -> measurements -->
  <g stroke="#026234" stroke-width="1.8" fill="none" marker-end="url(#arrowred)">
    <line x1="240" y1="218" x2="195" y2="270"/>
    <line x1="420" y1="218" x2="465" y2="270"/>
  </g>

  <!-- exclusivity annotation -->
  <text x="180" y="348" text-anchor="middle" font-family="monospace" font-size="12" fill="#6f6f78">exclusively measures Z₁</text>
  <text x="480" y="348" text-anchor="middle" font-family="monospace" font-size="12" fill="#6f6f78">mixes Z₂, Z₃</text>
</svg>
