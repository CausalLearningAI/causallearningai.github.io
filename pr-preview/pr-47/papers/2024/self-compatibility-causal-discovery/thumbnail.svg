<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="'JetBrains Mono', ui-monospace, monospace">
  <rect width="1200" height="480" fill="#fcfbf8"/>
  <style>
    .nd { fill: #fcfbf8; stroke: #1a1a1a; stroke-width: 2.4; }
    .lb { fill: #1a1a1a; font-size: 20px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
    .e  { stroke: #1a1a1a; stroke-width: 2.6; }
    .g  { stroke: #026234; }
    .gt { fill: #026234; }
    .r  { stroke: #b23b2e; }
    .rt { fill: #b23b2e; }
    .ttl { fill: #1a1a1a; font-size: 30px; font-weight: 700; }
    .sub { fill: #74726c; font-size: 17px; }
    .tag { font-size: 14px; font-weight: 700; letter-spacing: .08em; }
    .bx { fill: none; stroke-dasharray: 6 5; stroke-width: 1.8; }
  </style>
  <defs>
    <marker id="aK" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1a1a1a"/></marker>
    <marker id="aR" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#b23b2e"/></marker>
  </defs>

  <text class="ttl" x="70" y="92">Self&#8209;Compatibility</text>
  <text class="sub" x="72" y="126">Evaluating causal discovery without ground truth</text>
  <line x1="72" y1="150" x2="430" y2="150" stroke="#026234" stroke-width="3"/>

  <!-- subset S -->
  <rect class="bx g" x="120" y="220" width="210" height="200" rx="14"/>
  <text class="tag gt" x="138" y="248">RUN ON  S</text>
  <line class="e" x1="190" y1="298" x2="190" y2="368" marker-end="url(#aK)"/>
  <line class="e" x1="268" y1="305" x2="208" y2="362" marker-end="url(#aK)"/>
  <circle class="nd" cx="190" cy="288" r="22"/><text class="lb" x="190" y="288">X</text>
  <circle class="nd" cx="190" cy="378" r="22"/><text class="lb" x="190" y="378">Y</text>
  <circle class="nd" cx="278" cy="296" r="22"/><text class="lb" x="278" y="296">Z&#8321;</text>

  <!-- subset T -->
  <rect class="bx r" x="610" y="220" width="210" height="200" rx="14"/>
  <text class="tag rt" x="628" y="248">RUN ON  T</text>
  <line class="r" x1="680" y1="368" x2="680" y2="298" marker-end="url(#aR)" stroke-width="2.8"/>
  <line class="r" x1="758" y1="305" x2="698" y2="362" marker-end="url(#aR)" stroke-width="2.8"/>
  <circle class="nd" cx="680" cy="288" r="22"/><text class="lb" x="680" y="288">X</text>
  <circle class="nd" cx="680" cy="378" r="22"/><text class="lb" x="680" y="378">Y</text>
  <circle class="nd" cx="768" cy="296" r="22"/><text class="lb" x="768" y="296">Z&#8322;</text>

  <!-- conflict marker between -->
  <text x="470" y="318" font-size="46" font-weight="700" fill="#b23b2e" text-anchor="middle">&#8800;</text>
  <text x="470" y="360" font-size="15" fill="#b23b2e" text-anchor="middle" font-weight="700">incompatible</text>

  <!-- score panel -->
  <line x1="900" y1="220" x2="900" y2="420" stroke="#e4e1d9" stroke-width="2"/>
  <text class="tag gt" x="945" y="252">SCORE  &#954;</text>
  <text class="sub" x="945" y="300" font-size="15">stability across</text>
  <text class="sub" x="945" y="324" font-size="15">subsets of</text>
  <text class="sub" x="945" y="348" font-size="15"><tspan font-weight="700" fill="#1a1a1a">variables</tspan>, a proxy</text>
  <text class="sub" x="945" y="372" font-size="15">for SHD</text>
</svg>
