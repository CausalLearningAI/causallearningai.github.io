<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" font-family="'JetBrains Mono', monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#fbfaf7"/>
    </marker>
    <marker id="arrm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#b3402f"/>
    </marker>
  </defs>
  <rect width="720" height="360" fill="#16161d"/>

  <!-- edges (drawn first) -->
  <g stroke="#fbfaf7" stroke-width="1.6" fill="none" opacity="0.85">
    <!-- W,V -> Z -->
    <line x1="318" y1="120" x2="232" y2="168" marker-end="url(#arr)"/>
    <line x1="318" y1="210" x2="232" y2="188" marker-end="url(#arr)"/>
    <!-- W,V -> D -->
    <line x1="378" y1="120" x2="452" y2="184" marker-end="url(#arr)"/>
    <line x1="378" y1="210" x2="452" y2="188" marker-end="url(#arr)"/>
    <!-- D -> Y -->
    <line x1="500" y1="180" x2="566" y2="180" marker-end="url(#arr)"/>
    <!-- H -> D, H -> Y -->
    <line x1="566" y1="92" x2="490" y2="160" marker-end="url(#arr)"/>
    <line x1="600" y1="108" x2="590" y2="156" marker-end="url(#arr)"/>
  </g>

  <!-- confounding edges from V to H and Y, dashed orange -->
  <g stroke="#b3402f" stroke-width="1.6" fill="none" stroke-dasharray="5 4" opacity="0.95">
    <path d="M360 92 Q470 50 560 78" marker-end="url(#arrm)"/>
    <path d="M362 116 Q470 250 562 198" marker-end="url(#arrm)"/>
  </g>

  <!-- Z node (entangled instrument) -->
  <g>
    <ellipse cx="195" cy="178" rx="40" ry="34" fill="none" stroke="#fbfaf7" stroke-width="1.6"/>
    <text x="195" y="184" fill="#fbfaf7" font-size="18" text-anchor="middle">Z</text>
  </g>

  <!-- V node (invalid, shaded) -->
  <g>
    <ellipse cx="348" cy="104" rx="34" ry="24" fill="#b3402f" fill-opacity="0.22" stroke="#b3402f" stroke-width="1.6"/>
    <text x="348" y="110" fill="#fbfaf7" font-size="17" text-anchor="middle">V</text>
  </g>
  <!-- W node (valid, shaded) -->
  <g>
    <ellipse cx="348" cy="210" rx="34" ry="24" fill="#3f6f5b" fill-opacity="0.30" stroke="#7fb59c" stroke-width="1.6"/>
    <text x="348" y="216" fill="#fbfaf7" font-size="17" text-anchor="middle">W</text>
  </g>

  <!-- D node -->
  <circle cx="476" cy="180" r="26" fill="none" stroke="#fbfaf7" stroke-width="1.6"/>
  <text x="476" y="186" fill="#fbfaf7" font-size="17" text-anchor="middle">D</text>

  <!-- Y node -->
  <circle cx="592" cy="180" r="26" fill="none" stroke="#fbfaf7" stroke-width="1.6"/>
  <text x="592" y="186" fill="#fbfaf7" font-size="17" text-anchor="middle">Y</text>

  <!-- H node (confounder, shaded) -->
  <circle cx="586" cy="84" r="26" fill="#b3402f" fill-opacity="0.22" stroke="#b3402f" stroke-width="1.6"/>
  <text x="586" y="90" fill="#fbfaf7" font-size="17" text-anchor="middle">H</text>

  <!-- legend / labels -->
  <text x="195" y="246" fill="#9b9a93" font-size="12" text-anchor="middle">observed instrument</text>
  <text x="348" y="262" fill="#7fb59c" font-size="12" text-anchor="middle">valid (invariant)</text>
  <text x="348" y="60" fill="#b3402f" font-size="12" text-anchor="middle">invalid (shifts)</text>
  <text x="586" y="40" fill="#9b9a93" font-size="12" text-anchor="middle">unobserved confounder</text>
  <text x="678" y="178" fill="#9b9a93" font-size="12" text-anchor="end">∀ k ∈ [K]</text>
</svg>
