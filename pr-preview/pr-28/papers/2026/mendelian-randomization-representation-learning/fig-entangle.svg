<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" font-family="'JetBrains Mono', monospace">
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#fbfaf7"/>
    </marker>
    <marker id="arr2r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#b3402f"/>
    </marker>
  </defs>
  <rect width="720" height="320" fill="#16161d"/>

  <!-- columns: Z (observed) | U (latent) | D | Y, H above -->
  <!-- U -> Z fan (all latents feed all variants) -->
  <g stroke="#fbfaf7" stroke-width="1.2" fill="none" opacity="0.55">
    <line x1="300" y1="70" x2="190" y2="70" marker-end="url(#arr2)"/>
    <line x1="300" y1="70" x2="190" y2="160" marker-end="url(#arr2)"/>
    <line x1="300" y1="70" x2="190" y2="250" marker-end="url(#arr2)"/>
    <line x1="300" y1="160" x2="190" y2="70" marker-end="url(#arr2)"/>
    <line x1="300" y1="160" x2="190" y2="160" marker-end="url(#arr2)"/>
    <line x1="300" y1="160" x2="190" y2="250" marker-end="url(#arr2)"/>
    <line x1="300" y1="250" x2="190" y2="70" marker-end="url(#arr2)"/>
    <line x1="300" y1="250" x2="190" y2="160" marker-end="url(#arr2)"/>
    <line x1="300" y1="250" x2="190" y2="250" marker-end="url(#arr2)"/>
  </g>
  <!-- U -> D -->
  <g stroke="#fbfaf7" stroke-width="1.5" fill="none" opacity="0.85">
    <line x1="332" y1="70" x2="452" y2="150" marker-end="url(#arr2)"/>
    <line x1="332" y1="160" x2="452" y2="160" marker-end="url(#arr2)"/>
    <line x1="332" y1="250" x2="452" y2="172" marker-end="url(#arr2)"/>
    <line x1="500" y1="160" x2="560" y2="160" marker-end="url(#arr2)"/>
    <line x1="566" y1="92" x2="490" y2="142" marker-end="url(#arr2)"/>
    <line x1="586" y1="106" x2="586" y2="136" marker-end="url(#arr2)"/>
  </g>
  <!-- H -> U1 (the invalidating edge) orange -->
  <path d="M560 70 Q450 30 340 58" stroke="#b3402f" stroke-width="1.7" fill="none" marker-end="url(#arr2r)"/>

  <!-- Z nodes -->
  <g>
    <circle cx="170" cy="70" r="22" fill="none" stroke="#fbfaf7" stroke-width="1.5"/><text x="170" y="75" fill="#fbfaf7" font-size="13" text-anchor="middle">Z₁</text>
    <circle cx="170" cy="160" r="22" fill="none" stroke="#fbfaf7" stroke-width="1.5"/><text x="170" y="165" fill="#fbfaf7" font-size="13" text-anchor="middle">Z₂</text>
    <circle cx="170" cy="250" r="22" fill="none" stroke="#fbfaf7" stroke-width="1.5"/><text x="170" y="255" fill="#fbfaf7" font-size="13" text-anchor="middle">Z₃</text>
  </g>
  <!-- U nodes -->
  <g>
    <circle cx="318" cy="70" r="22" fill="#b3402f" fill-opacity="0.22" stroke="#b3402f" stroke-width="1.5"/><text x="318" y="75" fill="#fbfaf7" font-size="13" text-anchor="middle">U₁</text>
    <circle cx="318" cy="160" r="22" fill="#3f6f5b" fill-opacity="0.30" stroke="#7fb59c" stroke-width="1.5"/><text x="318" y="165" fill="#fbfaf7" font-size="13" text-anchor="middle">U₂</text>
    <circle cx="318" cy="250" r="22" fill="#3f6f5b" fill-opacity="0.30" stroke="#7fb59c" stroke-width="1.5"/><text x="318" y="255" fill="#fbfaf7" font-size="13" text-anchor="middle">U₃</text>
  </g>
  <!-- D, Y, H -->
  <circle cx="476" cy="160" r="24" fill="none" stroke="#fbfaf7" stroke-width="1.5"/><text x="476" y="165" fill="#fbfaf7" font-size="15" text-anchor="middle">D</text>
  <circle cx="586" cy="160" r="24" fill="none" stroke="#fbfaf7" stroke-width="1.5"/><text x="586" y="165" fill="#fbfaf7" font-size="15" text-anchor="middle">Y</text>
  <circle cx="580" cy="70" r="24" fill="#b3402f" fill-opacity="0.22" stroke="#b3402f" stroke-width="1.5"/><text x="580" y="75" fill="#fbfaf7" font-size="15" text-anchor="middle">H</text>

  <text x="170" y="300" fill="#9b9a93" font-size="12" text-anchor="middle">observed variants</text>
  <text x="318" y="300" fill="#9b9a93" font-size="12" text-anchor="middle">latent sources</text>
  <text x="318" y="30" fill="#b3402f" font-size="11" text-anchor="middle">confounded by H</text>
</svg>
