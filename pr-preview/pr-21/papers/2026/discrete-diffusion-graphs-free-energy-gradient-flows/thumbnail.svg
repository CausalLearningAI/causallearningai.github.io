<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <!-- free-energy landscape: descending contour rings -->
  <g stroke="#026234" stroke-width="1.4" fill="none" opacity="0.55">
    <ellipse cx="300" cy="195" rx="220" ry="70"/>
    <ellipse cx="300" cy="195" rx="160" ry="50"/>
    <ellipse cx="300" cy="195" rx="100" ry="32"/>
    <ellipse cx="300" cy="195" rx="48"  ry="16"/>
  </g>
  <!-- graph edges -->
  <g stroke="#6f6f78" stroke-width="1.2" opacity="0.8">
    <line x1="120" y1="110" x2="220" y2="150"/>
    <line x1="220" y1="150" x2="300" y2="110"/>
    <line x1="300" y1="110" x2="390" y2="155"/>
    <line x1="390" y1="155" x2="480" y2="120"/>
    <line x1="220" y1="150" x2="300" y2="195"/>
    <line x1="390" y1="155" x2="300" y2="195"/>
    <line x1="300" y1="195" x2="240" y2="265"/>
    <line x1="300" y1="195" x2="370" y2="270"/>
    <line x1="240" y1="265" x2="370" y2="270"/>
  </g>
  <!-- gradient-flow trajectory toward minimum -->
  <path d="M120 110 Q210 200 300 195" fill="none" stroke="#fbfaf7" stroke-width="2"
        stroke-dasharray="5 5" opacity="0.9"/>
  <!-- graph vertices -->
  <g fill="#fbfaf7">
    <circle cx="120" cy="110" r="6"/>
    <circle cx="220" cy="150" r="5"/>
    <circle cx="300" cy="110" r="5"/>
    <circle cx="390" cy="155" r="5"/>
    <circle cx="480" cy="120" r="5"/>
    <circle cx="240" cy="265" r="5"/>
    <circle cx="370" cy="270" r="5"/>
  </g>
  <!-- minimum marker -->
  <circle cx="300" cy="195" r="7" fill="#026234"/>
</svg>
