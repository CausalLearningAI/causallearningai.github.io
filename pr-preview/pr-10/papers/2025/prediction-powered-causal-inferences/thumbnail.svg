<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <!-- two similar experiments: source (annotated) and target (unlabeled) -->
  <g fill="none" stroke="#3a3a44" stroke-width="1.5" stroke-dasharray="5 5">
    <rect x="48" y="96" width="200" height="188" rx="10"/>
    <rect x="352" y="96" width="200" height="188" rx="10"/>
  </g>
  <!-- transfer arrow -->
  <g stroke="#026234" stroke-width="2" fill="none">
    <path d="M256 190 L344 190"/>
    <path d="M334 182 L344 190 L334 198"/>
  </g>
  <!-- confidence interval marks -->
  <g stroke="#fbfaf7" stroke-width="2">
    <line x1="96" y1="200" x2="200" y2="200"/>
    <line x1="400" y1="200" x2="504" y2="200"/>
  </g>
  <g fill="#026234">
    <circle cx="148" cy="200" r="6"/>
    <circle cx="452" cy="200" r="6"/>
  </g>
  <g stroke="#fbfaf7" stroke-width="1.5">
    <line x1="96" y1="192" x2="96" y2="208"/>
    <line x1="200" y1="192" x2="200" y2="208"/>
    <line x1="400" y1="192" x2="400" y2="208"/>
    <line x1="504" y1="192" x2="504" y2="208"/>
  </g>
  <!-- target marker: ground-truth (dashed) overlap -->
  <line x1="452" y1="120" x2="452" y2="172" stroke="#fbfaf7" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.7"/>
</svg>
