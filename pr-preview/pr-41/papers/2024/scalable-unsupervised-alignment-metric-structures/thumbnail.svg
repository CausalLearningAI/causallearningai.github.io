<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <!-- two point clouds (metric structures X and Y) aligned by a learned assignment -->
  <!-- domain X (left) -->
  <g fill="#9aa0aa">
    <circle cx="70"  cy="110" r="6"/>
    <circle cx="95"  cy="175" r="6"/>
    <circle cx="62"  cy="240" r="6"/>
    <circle cx="110" cy="300" r="6"/>
    <circle cx="120" cy="90"  r="6"/>
  </g>
  <text x="86" y="55" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="16" fill="#9aa0aa" font-style="italic">X</text>
  <!-- domain Y (right) -->
  <g fill="#c8b88a">
    <circle cx="490" cy="100" r="6"/>
    <circle cx="538" cy="160" r="6"/>
    <circle cx="505" cy="225" r="6"/>
    <circle cx="540" cy="290" r="6"/>
    <circle cx="478" cy="305" r="6"/>
  </g>
  <text x="514" y="55" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="16" fill="#c8b88a" font-style="italic">Y</text>
  <!-- learned assignment (transport plan) connecting matched points -->
  <g stroke="#2f9e6b" stroke-width="1.6" opacity="0.8">
    <line x1="120" y1="90"  x2="490" y2="100"/>
    <line x1="95"  y1="175" x2="538" y2="160"/>
    <line x1="62"  y1="240" x2="505" y2="225"/>
    <line x1="110" y1="300" x2="540" y2="290"/>
    <line x1="70"  y1="110" x2="478" y2="305"/>
  </g>
  <!-- central node: the learned cost / OT step -->
  <circle cx="300" cy="200" r="30" fill="#16161d" stroke="#2f9e6b" stroke-width="2"/>
  <text x="300" y="207" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="20" fill="#fbfaf7">&#x3A0;*</text>
  <text x="300" y="350" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="2" fill="#fbfaf7">GW &#8594; OT ALIGNMENT</text>
</svg>
