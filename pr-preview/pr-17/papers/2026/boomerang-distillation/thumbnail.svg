<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <!-- axes -->
  <line x1="80" y1="300" x2="540" y2="300" stroke="#6f6f78" stroke-width="1.5"/>
  <line x1="80" y1="80"  x2="80"  y2="300" stroke="#6f6f78" stroke-width="1.5"/>
  <!-- smooth interpolation curve student -> teacher -->
  <polyline points="100,250 150,236 200,222 250,205 300,182 350,150 400,118 450,96 500,84"
            fill="none" stroke="#026234" stroke-width="2.5"/>
  <!-- interpolated dots along the curve -->
  <g fill="#fbfaf7">
    <circle cx="150" cy="236" r="4"/>
    <circle cx="200" cy="222" r="4"/>
    <circle cx="250" cy="205" r="4"/>
    <circle cx="300" cy="182" r="4"/>
    <circle cx="350" cy="150" r="4"/>
    <circle cx="400" cy="118" r="4"/>
    <circle cx="450" cy="96" r="4"/>
  </g>
  <!-- student endpoint (triangle) -->
  <path d="M100 240 l8 16 l-16 0 Z" fill="#5b9bd5"/>
  <!-- teacher endpoint (star-ish dot) -->
  <circle cx="500" cy="84" r="7" fill="#e8b800"/>
  <text x="96" y="284" font-family="Inter, sans-serif" font-size="13" fill="#9a9aa2">student</text>
  <text x="470" y="64" font-family="Inter, sans-serif" font-size="13" fill="#e8b800">teacher</text>
  <text x="310" y="332" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#6f6f78">parameter count</text>
  <text x="56" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#6f6f78" transform="rotate(-90 56 190)">accuracy</text>
</svg>
