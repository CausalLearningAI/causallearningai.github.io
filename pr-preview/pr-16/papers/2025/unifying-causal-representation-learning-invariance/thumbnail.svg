<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <!-- two data subsets (environments / views) overlapping on a shared invariant block -->
  <g stroke="#6f6f78" stroke-width="1.2" fill="none" opacity="0.5">
    <rect x="120" y="120" width="200" height="150" rx="12"/>
    <rect x="280" y="120" width="200" height="150" rx="12"/>
  </g>
  <!-- shared invariant block A in the overlap -->
  <rect x="280" y="120" width="40" height="150" fill="#026234" opacity="0.16"/>
  <!-- latent variables -->
  <g fill="#fbfaf7">
    <circle cx="180" cy="160" r="7"/>
    <circle cx="180" cy="230" r="7"/>
    <circle cx="300" cy="195" r="7"/>
    <circle cx="420" cy="160" r="7"/>
    <circle cx="420" cy="230" r="7"/>
  </g>
  <!-- the invariant variable highlighted -->
  <circle cx="300" cy="195" r="7" fill="#026234"/>
  <!-- edges: each subset keeps the same invariant node -->
  <g stroke="#6f6f78" stroke-width="1.6" fill="none" opacity="0.8">
    <path d="M187 160 L294 192"/>
    <path d="M187 230 L294 198"/>
    <path d="M306 192 L413 160"/>
    <path d="M306 198 L413 230"/>
  </g>
  <!-- equality marker under the invariant block -->
  <g stroke="#026234" stroke-width="2">
    <path d="M288 290 L312 290"/>
    <path d="M288 298 L312 298"/>
  </g>
</svg>
