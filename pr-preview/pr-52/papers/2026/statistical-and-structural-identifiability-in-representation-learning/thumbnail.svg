<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <!-- two independent runs converging to the same structure up to a rotation -->
  <g fill="none" stroke="#6f6f78" stroke-width="1.2" opacity="0.55">
    <circle cx="190" cy="190" r="70"/>
    <circle cx="410" cy="190" r="70"/>
  </g>
  <!-- run A latents -->
  <g fill="#026234">
    <circle cx="190" cy="135" r="4"/>
    <circle cx="232" cy="172" r="4"/>
    <circle cx="225" cy="225" r="4"/>
    <circle cx="158" cy="232" r="4"/>
    <circle cx="148" cy="172" r="4"/>
  </g>
  <!-- run B latents: same configuration, rotated -->
  <g fill="#fbfaf7">
    <circle cx="410" cy="245" r="4"/>
    <circle cx="368" cy="208" r="4"/>
    <circle cx="375" cy="155" r="4"/>
    <circle cx="442" cy="148" r="4"/>
    <circle cx="452" cy="208" r="4"/>
  </g>
  <!-- alignment arrow -->
  <g stroke="#fbfaf7" stroke-width="1.5" fill="none" opacity="0.85">
    <path d="M270 190 H330"/>
    <path d="M322 182 L332 190 L322 198"/>
  </g>
  <text x="300" y="320" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="15" fill="#6f6f78" letter-spacing="2">f&#x3B8; &#x2248; h &#x2218; f&#x3B8;&#x2032;</text>
</svg>
