<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <!-- snapshot marginals at three time points -->
  <g fill="#94d2bd" opacity="0.55">
    <circle cx="120" cy="150" r="3"/><circle cx="135" cy="185" r="3"/>
    <circle cx="110" cy="215" r="3"/><circle cx="145" cy="230" r="3"/>
    <circle cx="125" cy="120" r="3"/>
  </g>
  <g fill="#ee9b00" opacity="0.55">
    <circle cx="300" cy="120" r="3"/><circle cx="315" cy="160" r="3"/>
    <circle cx="290" cy="200" r="3"/><circle cx="320" cy="245" r="3"/>
    <circle cx="305" cy="285" r="3"/>
  </g>
  <g fill="#0a9396" opacity="0.55">
    <circle cx="480" cy="110" r="3"/><circle cx="495" cy="150" r="3"/>
    <circle cx="470" cy="210" r="3"/><circle cx="500" cy="260" r="3"/>
    <circle cx="485" cy="300" r="3"/>
  </g>
  <!-- locally linear flow: smooth trajectories bending through operating points -->
  <g stroke="#026234" stroke-width="2" fill="none" opacity="0.9">
    <path d="M125 175 Q210 120 300 145 Q400 175 488 150"/>
    <path d="M125 205 Q210 230 300 215 Q400 200 488 230"/>
    <path d="M130 235 Q215 290 305 270 Q400 245 490 285"/>
  </g>
  <!-- operating points where the linear operator A(z,t) is predicted -->
  <g fill="#fbfaf7">
    <circle cx="300" cy="145" r="4"/>
    <circle cx="300" cy="215" r="4"/>
    <circle cx="305" cy="270" r="4"/>
  </g>
  <!-- local linear tangents at the operating points -->
  <g stroke="#fbfaf7" stroke-width="1" opacity="0.7">
    <line x1="278" y1="155" x2="322" y2="135"/>
    <line x1="278" y1="219" x2="322" y2="211"/>
    <line x1="284" y1="278" x2="326" y2="262"/>
  </g>
</svg>
