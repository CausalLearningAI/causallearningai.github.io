<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <!-- forward path -->
  <path d="M120 250 C 220 110, 360 300, 480 150"
        fill="none" stroke="#026234" stroke-width="2.5"/>
  <!-- time-reversed path -->
  <path d="M120 250 C 240 290, 340 120, 480 150"
        fill="none" stroke="#6f6f78" stroke-width="2" stroke-dasharray="6 5"/>
  <!-- endpoints -->
  <circle cx="120" cy="250" r="5" fill="#fbfaf7"/>
  <circle cx="480" cy="150" r="5" fill="#fbfaf7"/>
  <!-- arrow of time -->
  <g stroke="#fbfaf7" stroke-width="1.2" opacity="0.55">
    <line x1="150" y1="330" x2="450" y2="330"/>
    <polyline points="440,323 452,330 440,337" fill="none"/>
  </g>
</svg>
