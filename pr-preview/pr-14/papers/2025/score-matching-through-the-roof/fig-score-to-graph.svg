<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" font-family="'JetBrains Mono', ui-monospace, monospace">
  <rect width="920" height="360" fill="#fbfaf7"/>
  <!-- Stage 1: data -->
  <g>
    <text x="120" y="40" text-anchor="middle" font-size="15" fill="#16161d" font-weight="600">observed data</text>
    <text x="120" y="60" text-anchor="middle" font-size="12" fill="#7a756c">samples of V</text>
    <g stroke="#026234" fill="#026234">
      <circle cx="70" cy="120" r="3"/><circle cx="100" cy="150" r="3"/><circle cx="140" cy="110" r="3"/>
      <circle cx="90" cy="190" r="3"/><circle cx="160" cy="170" r="3"/><circle cx="120" cy="230" r="3"/>
      <circle cx="180" cy="220" r="3"/><circle cx="60" cy="200" r="3"/><circle cx="150" cy="250" r="3"/>
      <circle cx="110" cy="140" r="3"/><circle cx="170" cy="130" r="3"/><circle cx="80" cy="250" r="3"/>
    </g>
    <rect x="48" y="95" width="150" height="175" fill="none" stroke="#cfc8bd" stroke-width="1"/>
  </g>
  <!-- arrow -->
  <g stroke="#16161d" stroke-width="1.5" fill="none">
    <path d="M210 180 H272"/>
    <path d="M264 173 L272 180 L264 187" fill="none"/>
  </g>
  <!-- Stage 2: score -->
  <g>
    <text x="360" y="40" text-anchor="middle" font-size="15" fill="#16161d" font-weight="600">score function</text>
    <text x="360" y="60" text-anchor="middle" font-size="13" fill="#7a756c">&#8711; log p(V)</text>
    <rect x="300" y="95" width="120" height="120" fill="#16161d" rx="4"/>
    <text x="360" y="135" text-anchor="middle" font-size="13" fill="#fbfaf7">score</text>
    <text x="360" y="158" text-anchor="middle" font-size="13" fill="#fbfaf7">matching</text>
    <text x="360" y="181" text-anchor="middle" font-size="11" fill="#cfc8bd">estimator</text>
    <text x="360" y="255" text-anchor="middle" font-size="12" fill="#7a756c">Hessian &#8711;&#178; log p(V)</text>
    <text x="360" y="274" text-anchor="middle" font-size="12" fill="#7a756c">+ residuals</text>
  </g>
  <!-- arrow -->
  <g stroke="#16161d" stroke-width="1.5" fill="none">
    <path d="M440 180 H502"/>
    <path d="M494 173 L502 180 L494 187"/>
  </g>
  <!-- Stage 3: two readouts -->
  <g>
    <text x="690" y="40" text-anchor="middle" font-size="15" fill="#16161d" font-weight="600">causal structure</text>
    <!-- skeleton via off-diagonal Hessian -->
    <text x="600" y="78" text-anchor="middle" font-size="11" fill="#7a756c">off-diagonal &#8594; edges</text>
    <g>
      <circle cx="560" cy="120" r="16" fill="none" stroke="#16161d" stroke-width="1.5"/>
      <text x="560" y="125" text-anchor="middle" font-size="12" fill="#16161d">Vi</text>
      <circle cx="640" cy="120" r="16" fill="none" stroke="#16161d" stroke-width="1.5"/>
      <text x="640" y="125" text-anchor="middle" font-size="12" fill="#16161d">Vj</text>
      <line x1="576" y1="120" x2="624" y2="120" stroke="#16161d" stroke-width="1.5"/>
    </g>
    <!-- directions via residuals -->
    <text x="690" y="200" text-anchor="middle" font-size="11" fill="#7a756c">residuals &#8594; directions &amp; latents</text>
    <g>
      <circle cx="600" cy="250" r="16" fill="none" stroke="#026234" stroke-width="1.8"/>
      <text x="600" y="255" text-anchor="middle" font-size="12" fill="#026234">Va</text>
      <circle cx="700" cy="250" r="16" fill="none" stroke="#026234" stroke-width="1.8"/>
      <text x="700" y="255" text-anchor="middle" font-size="12" fill="#026234">Vb</text>
      <circle cx="780" cy="250" r="16" fill="none" stroke="#026234" stroke-width="1.8"/>
      <text x="780" y="255" text-anchor="middle" font-size="12" fill="#026234">Vc</text>
      <!-- directed edge -->
      <line x1="616" y1="250" x2="678" y2="250" stroke="#026234" stroke-width="1.8"/>
      <path d="M670 244 L684 250 L670 256" fill="#026234"/>
      <!-- bidirected (latent confounder) edge -->
      <path d="M716 244 Q740 224 762 244" fill="none" stroke="#026234" stroke-width="1.8" stroke-dasharray="4 3"/>
      <path d="M722 240 L716 246 L724 250" fill="#026234"/>
      <path d="M756 250 L764 246 L758 240" fill="#026234"/>
      <text x="740" y="215" text-anchor="middle" font-size="10" fill="#7a756c">&#8596; latent</text>
    </g>
  </g>
</svg>
