<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="'JetBrains Mono', ui-monospace, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#333"/>
    </marker>
    <style>
      .node { fill: #fff; stroke: #333; stroke-width: 2; }
      .lbl  { fill: #1a1a1a; font-size: 30px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
      .edge { stroke: #333; stroke-width: 2; fill: none; }
      .cap  { fill: #555; font-size: 14px; text-anchor: middle; }
      @media (prefers-color-scheme: dark) {
        .node { fill: #1e1e1e; stroke: #cfcfcf; }
        .lbl  { fill: #ededed; }
        .edge { stroke: #cfcfcf; }
        .cap  { fill: #b5b5b5; }
        #arrow path { fill: #cfcfcf; }
      }
    </style>
  </defs>

  <!-- nodes: S  W (bottom)  T (top)  X  Y -->
  <line class="edge" x1="140" y1="232" x2="92"  y2="178" marker-end="url(#arrow)"/>  <!-- W -> S -->
  <line class="edge" x1="178" y1="222" x2="372" y2="172" marker-end="url(#arrow)"/>  <!-- W -> X -->
  <line class="edge" x1="372" y1="98"  x2="372" y2="118" marker-end="url(#arrow)"/>  <!-- T -> X -->
  <line class="edge" x1="438" y1="150" x2="582" y2="150" marker-end="url(#arrow)"/>  <!-- X -> Y -->

  <circle class="node" cx="70"  cy="150" r="40"/>
  <text class="lbl" x="70"  y="150">S</text>
  <circle class="node" cx="160" cy="250" r="40"/>
  <text class="lbl" x="160" y="250">W</text>
  <circle class="node" cx="372" cy="58"  r="40"/>
  <text class="lbl" x="372" y="58">T</text>
  <circle class="node" cx="372" cy="150" r="40"/>
  <text class="lbl" x="372" y="150">X</text>
  <circle class="node" cx="622" cy="150" r="40"/>
  <text class="lbl" x="622" y="150">Y</text>

  <text class="cap" x="70"  y="208">annotation flag</text>
  <text class="cap" x="160" y="308">settings</text>
  <text class="cap" x="372" y="14">treatment</text>
  <text class="cap" x="372" y="208">observation</text>
  <text class="cap" x="622" y="208">outcome</text>
</svg>
