<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#fcfbf8"/>
  <!-- latent variables z1..z6; z1,z2 are the joint content (accent), rest are styles -->
  <g font-family="'JetBrains Mono', monospace" font-size="15" text-anchor="middle">
    <!-- content latents (shared by all 4 views) -->
    <g>
      <circle cx="230" cy="70" r="20" fill="#026234" fill-opacity="0.16" stroke="#026234" stroke-width="2"/>
      <text x="230" y="75" fill="#026234">z1</text>
      <circle cx="370" cy="70" r="20" fill="#026234" fill-opacity="0.16" stroke="#026234" stroke-width="2"/>
      <text x="370" y="75" fill="#026234">z2</text>
    </g>
    <!-- style latents -->
    <g fill="none" stroke="#a8a399" stroke-width="1.5">
      <circle cx="120" cy="150" r="18"/>
      <circle cx="240" cy="150" r="18"/>
      <circle cx="360" cy="150" r="18"/>
      <circle cx="480" cy="150" r="18"/>
    </g>
    <g fill="#6f6c63" font-size="13">
      <text x="120" y="155">z3</text>
      <text x="240" y="155">z4</text>
      <text x="360" y="155">z5</text>
      <text x="480" y="155">z6</text>
    </g>
    <!-- a causal edge among latents -->
    <line x1="248" y1="84" x2="352" y2="84" stroke="#026234" stroke-width="1.6" marker-end="url(#ar)"/>
  </g>
  <!-- four partial views, each a mixture of a subset of latents -->
  <g font-family="'JetBrains Mono', monospace" font-size="13" text-anchor="middle">
    <g fill="#ffffff" stroke="#161513" stroke-width="1.4">
      <rect x="80"  y="270" width="80" height="46" rx="7"/>
      <rect x="200" y="270" width="80" height="46" rx="7"/>
      <rect x="320" y="270" width="80" height="46" rx="7"/>
      <rect x="440" y="270" width="80" height="46" rx="7"/>
    </g>
    <g fill="#161513">
      <text x="120" y="298">view x1</text>
      <text x="240" y="298">view x2</text>
      <text x="360" y="298">view x3</text>
      <text x="480" y="298">view x4</text>
    </g>
  </g>
  <!-- mixing arrows from content latents into each view -->
  <g stroke="#026234" stroke-width="1.3" opacity="0.7">
    <line x1="222" y1="90"  x2="124" y2="266" marker-end="url(#ar)"/>
    <line x1="232" y1="92"  x2="240" y2="266" marker-end="url(#ar)"/>
    <line x1="376" y1="92"  x2="360" y2="266" marker-end="url(#ar)"/>
    <line x1="380" y1="88"  x2="480" y2="266" marker-end="url(#ar)"/>
  </g>
  <text x="300" y="40" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="2" fill="#161513">PARTIAL OBSERVABILITY</text>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#026234"/>
    </marker>
  </defs>
</svg>
