<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" font-family="'JetBrains Mono', monospace">
  <rect width="900" height="430" fill="#fcfbf8"/>
  <text x="450" y="34" text-anchor="middle" font-size="15" letter-spacing="1.5" fill="#161513">EXAMPLE: K = 4 VIEWS, N = 6 LATENTS</text>

  <!-- latent layer -->
  <g text-anchor="middle" font-size="15">
    <!-- joint content z1, z2 (accent) -->
    <circle cx="380" cy="100" r="22" fill="#026234" fill-opacity="0.16" stroke="#026234" stroke-width="2.2"/>
    <text x="380" y="105" fill="#026234">z1</text>
    <circle cx="520" cy="100" r="22" fill="#026234" fill-opacity="0.16" stroke="#026234" stroke-width="2.2"/>
    <text x="520" y="105" fill="#026234">z2</text>
    <!-- style latents -->
    <g fill="none" stroke="#a8a399" stroke-width="1.6">
      <circle cx="180" cy="100" r="20"/>
      <circle cx="280" cy="100" r="20"/>
      <circle cx="620" cy="100" r="20"/>
      <circle cx="720" cy="100" r="20"/>
    </g>
    <g fill="#6f6c63">
      <text x="180" y="105">z3</text>
      <text x="280" y="105">z4</text>
      <text x="620" y="105">z5</text>
      <text x="720" y="105">z6</text>
    </g>
    <!-- causal edge between two latents -->
    <line x1="402" y1="88" x2="498" y2="88" stroke="#026234" stroke-width="1.8" marker-end="url(#a)"/>
    <text x="450" y="78" text-anchor="middle" font-size="11" fill="#026234">causal relation</text>
  </g>

  <!-- view layer -->
  <g text-anchor="middle" font-size="13">
    <g fill="#ffffff" stroke="#161513" stroke-width="1.5">
      <rect x="110" y="300" width="130" height="58" rx="9"/>
      <rect x="320" y="300" width="130" height="58" rx="9"/>
      <rect x="530" y="300" width="130" height="58" rx="9"/>
      <rect x="740" y="300" width="130" height="58" rx="9"/>
    </g>
    <g fill="#161513" font-size="14">
      <text x="175" y="325">x1 = f1(...)</text>
      <text x="385" y="325">x2 = f2(...)</text>
      <text x="595" y="325">x3 = f3(...)</text>
      <text x="805" y="325">x4 = f4(...)</text>
    </g>
    <g fill="#6f6c63" font-size="11">
      <text x="175" y="345">z1 z2 z3 z4 z5</text>
      <text x="385" y="345">z1 z2 z3 z5 z6</text>
      <text x="595" y="345">z1 z2 z3 z4 z6</text>
      <text x="805" y="345">z1 z2 z4 z5 z6</text>
    </g>
  </g>

  <!-- z1 feeds all four views (accent) -->
  <g stroke="#026234" stroke-width="1.3" opacity="0.75">
    <line x1="372" y1="120" x2="180" y2="296" marker-end="url(#a)"/>
    <line x1="376" y1="121" x2="385" y2="296" marker-end="url(#a)"/>
    <line x1="388" y1="120" x2="592" y2="296" marker-end="url(#a)"/>
    <line x1="392" y1="118" x2="800" y2="296" marker-end="url(#a)"/>
  </g>

  <text x="450" y="408" text-anchor="middle" font-size="12" fill="#6f6c63">Joint content shared by all four views is (z1, z2); each view also mixes a different subset of styles.</text>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#026234"/>
    </marker>
  </defs>
</svg>
