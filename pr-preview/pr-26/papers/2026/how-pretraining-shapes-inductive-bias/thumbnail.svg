<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <!-- the (l-order, PD) triangle: the trade-off region -->
  <g transform="translate(150,70)">
    <!-- triangle edges -->
    <path d="M0 240 L0 0 L300 240 Z" fill="#026234" fill-opacity="0.10" stroke="#026234" stroke-width="1.5"/>
    <!-- trade-off diagonal (l-order + PD = 1) -->
    <line x1="0" y1="0" x2="300" y2="240" stroke="#fbfaf7" stroke-width="1" stroke-dasharray="5 5" opacity="0.6"/>
    <!-- corner regimes -->
    <g fill="#fbfaf7">
      <circle cx="0"   cy="0"   r="5"/>
      <circle cx="0"   cy="240" r="5"/>
      <circle cx="300" cy="240" r="5"/>
      <!-- interior regime IV -->
      <circle cx="100" cy="160" r="6" fill="#026234"/>
    </g>
  </g>
  <!-- axis labels -->
  <g fill="#9a958c" font-family="monospace" font-size="15">
    <text x="150" y="335" text-anchor="middle">ℓ-order</text>
    <text x="118" y="195" text-anchor="middle" transform="rotate(-90 118 195)">PD</text>
  </g>
  <g fill="#fbfaf7" font-family="monospace" font-size="13">
    <text x="160" y="60"  text-anchor="start">I</text>
    <text x="160" y="320" text-anchor="start">II</text>
    <text x="446" y="320" text-anchor="end">III</text>
    <text x="262" y="232" text-anchor="start" fill="#026234">IV</text>
  </g>
</svg>
