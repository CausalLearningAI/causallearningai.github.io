<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <!-- overcomplete dictionary: many faint atoms radiating from origin -->
  <g stroke="#6f6f78" stroke-width="1" opacity="0.5">
    <line x1="300" y1="190" x2="180" y2="120"/>
    <line x1="300" y1="190" x2="210" y2="260"/>
    <line x1="300" y1="190" x2="420" y2="110"/>
    <line x1="300" y1="190" x2="400" y2="270"/>
    <line x1="300" y1="190" x2="150" y2="200"/>
    <line x1="300" y1="190" x2="450" y2="200"/>
    <line x1="300" y1="190" x2="300" y2="70"/>
    <line x1="300" y1="190" x2="300" y2="310"/>
  </g>
  <!-- a near-orthogonal active pair (RIP-satisfying patch) in red -->
  <g stroke="#026234" stroke-width="2.5" fill="none">
    <line x1="300" y1="190" x2="200" y2="100"/>
    <line x1="300" y1="190" x2="410" y2="250"/>
    <path d="M250 145 A70 70 0 0 1 355 220" stroke="#026234" stroke-width="1.2" opacity="0.7"/>
  </g>
  <!-- atom tips -->
  <g fill="#fbfaf7">
    <circle cx="200" cy="100" r="4"/>
    <circle cx="410" cy="250" r="4"/>
  </g>
  <g fill="#6f6f78">
    <circle cx="180" cy="120" r="2.5"/>
    <circle cx="210" cy="260" r="2.5"/>
    <circle cx="420" cy="110" r="2.5"/>
    <circle cx="400" cy="270" r="2.5"/>
    <circle cx="150" cy="200" r="2.5"/>
    <circle cx="450" cy="200" r="2.5"/>
    <circle cx="300" cy="70" r="2.5"/>
    <circle cx="300" cy="310" r="2.5"/>
  </g>
  <circle cx="300" cy="190" r="4" fill="#fbfaf7"/>
</svg>
