<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <defs>
    <marker id="t" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#fbfaf7"/>
    </marker>
  </defs>
  <!-- entangled blob Z -->
  <circle cx="150" cy="190" r="56" fill="none" stroke="#fbfaf7" stroke-width="2" opacity="0.85"/>
  <g opacity="0.85">
    <circle cx="132" cy="170" r="4" fill="#b3402f"/>
    <circle cx="168" cy="166" r="4" fill="#7fb59c"/>
    <circle cx="150" cy="200" r="4" fill="#7fb59c"/>
    <circle cx="124" cy="206" r="4" fill="#b3402f"/>
    <circle cx="176" cy="208" r="4" fill="#7fb59c"/>
  </g>
  <!-- arrows splitting -->
  <line x1="216" y1="170" x2="340" y2="120" stroke="#fbfaf7" stroke-width="2" marker-end="url(#t)" opacity="0.85"/>
  <line x1="216" y1="210" x2="340" y2="260" stroke="#fbfaf7" stroke-width="2" marker-end="url(#t)" opacity="0.85"/>
  <!-- W valid -->
  <circle cx="400" cy="120" r="40" fill="#3f6f5b" fill-opacity="0.30" stroke="#7fb59c" stroke-width="2"/>
  <text x="400" y="128" fill="#fbfaf7" font-family="'JetBrains Mono',monospace" font-size="22" text-anchor="middle">W</text>
  <!-- V invalid -->
  <circle cx="400" cy="260" r="40" fill="#b3402f" fill-opacity="0.24" stroke="#b3402f" stroke-width="2"/>
  <text x="400" y="268" fill="#fbfaf7" font-family="'JetBrains Mono',monospace" font-size="22" text-anchor="middle">V</text>
  <text x="150" y="270" fill="#fbfaf7" font-family="'JetBrains Mono',monospace" font-size="20" text-anchor="middle">Z</text>
</svg>
