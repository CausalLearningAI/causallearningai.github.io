<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <!-- full target population: faint scatter -->
  <g fill="#fbfaf7" opacity="0.28">
    <circle cx="120" cy="120" r="3"/><circle cx="170" cy="90" r="3"/>
    <circle cx="210" cy="150" r="3"/><circle cx="95" cy="200" r="3"/>
    <circle cx="160" cy="230" r="3"/><circle cx="240" cy="100" r="3"/>
    <circle cx="130" cy="280" r="3"/><circle cx="220" cy="300" r="3"/>
    <circle cx="300" cy="130" r="3"/><circle cx="350" cy="250" r="3"/>
    <circle cx="290" cy="320" r="3"/><circle cx="380" cy="310" r="3"/>
    <circle cx="430" cy="280" r="3"/><circle cx="470" cy="330" r="3"/>
    <circle cx="200" cy="60" r="3"/><circle cx="110" cy="330" r="3"/>
  </g>
  <!-- selected sub-population: highlighted region -->
  <rect x="330" y="70" width="200" height="150" rx="10" fill="#026234" opacity="0.12" stroke="#026234" stroke-width="1.5"/>
  <g fill="#026234">
    <circle cx="370" cy="110" r="4"/><circle cx="420" cy="95" r="4"/>
    <circle cx="460" cy="130" r="4"/><circle cx="395" cy="160" r="4"/>
    <circle cx="445" cy="180" r="4"/><circle cx="490" cy="105" r="4"/>
    <circle cx="410" cy="195" r="4"/><circle cx="470" cy="200" r="4"/>
  </g>
  <!-- two regression curves: observed (selected) vs full -->
  <path d="M60 300 Q200 230 540 150" stroke="#fbfaf7" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M60 260 Q260 130 540 110" stroke="#026234" stroke-width="2.2" fill="none"/>
</svg>
