<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300" font-family="JetBrains Mono, monospace">
  <rect width="920" height="300" fill="#fcfbf8"/>

  <!-- Two data sources -->
  <g>
    <rect x="30" y="40" width="180" height="70" rx="6" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
    <text x="120" y="68" text-anchor="middle" font-size="13" fill="#1a1a1a">DYAMOND-Summer</text>
    <text x="120" y="86" text-anchor="middle" font-size="12" fill="#74726c">SAM global model</text>
    <text x="120" y="102" text-anchor="middle" font-size="11" fill="#74726c">(simulation)</text>

    <rect x="30" y="190" width="180" height="70" rx="6" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
    <text x="120" y="218" text-anchor="middle" font-size="13" fill="#1a1a1a">Satellite obs.</text>
    <text x="120" y="236" text-anchor="middle" font-size="12" fill="#74726c">+ ERA5 fields</text>
    <text x="120" y="252" text-anchor="middle" font-size="11" fill="#74726c">(observations)</text>
  </g>

  <!-- TOOCAN tracking -->
  <g>
    <rect x="300" y="115" width="160" height="70" rx="6" fill="#1a1a1a"/>
    <text x="380" y="143" text-anchor="middle" font-size="13" fill="#fcfbf8">TOOCAN</text>
    <text x="380" y="161" text-anchor="middle" font-size="11" fill="#cfcdc6">track each DCS</text>
    <text x="380" y="176" text-anchor="middle" font-size="11" fill="#cfcdc6">over its lifecycle</text>
  </g>

  <!-- ML models -->
  <g>
    <rect x="540" y="115" width="170" height="70" rx="6" fill="none" stroke="#026234" stroke-width="1.6"/>
    <text x="625" y="139" text-anchor="middle" font-size="13" fill="#026234">ML models</text>
    <text x="625" y="157" text-anchor="middle" font-size="11" fill="#74726c">Lasso · 2 deep nets</text>
    <text x="625" y="173" text-anchor="middle" font-size="11" fill="#74726c">early-stage + environ.</text>
  </g>

  <!-- Outputs -->
  <g>
    <rect x="770" y="40" width="120" height="70" rx="6" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
    <text x="830" y="70" text-anchor="middle" font-size="12" fill="#1a1a1a">predict</text>
    <text x="830" y="88" text-anchor="middle" font-size="12" fill="#1a1a1a">max area</text>

    <rect x="770" y="190" width="120" height="70" rx="6" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
    <text x="830" y="214" text-anchor="middle" font-size="12" fill="#1a1a1a">integrated</text>
    <text x="830" y="232" text-anchor="middle" font-size="12" fill="#1a1a1a">gradients</text>
    <text x="830" y="249" text-anchor="middle" font-size="11" fill="#74726c">(which vars?)</text>
  </g>

  <!-- arrows -->
  <g stroke="#74726c" stroke-width="1.4" fill="none">
    <path d="M210 75 C 255 75, 255 140, 300 145"/>
    <path d="M210 225 C 255 225, 255 160, 300 160"/>
    <path d="M460 150 H 540"/>
    <path d="M710 140 C 745 110, 745 90, 770 80"/>
    <path d="M710 160 C 745 195, 745 215, 770 222"/>
  </g>
  <g fill="#74726c" stroke="none">
    <path d="M294 145 l8 -4 v8 z"/>
    <path d="M294 160 l8 -4 v8 z"/>
    <path d="M534 150 l8 -4 v8 z"/>
    <path d="M766 80 l6 -6 -1 8 z"/>
    <path d="M766 222 l5 -7 1 8 z"/>
  </g>
</svg>
