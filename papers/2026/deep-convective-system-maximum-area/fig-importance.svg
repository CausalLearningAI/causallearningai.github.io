<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" font-family="JetBrains Mono, monospace">
  <rect width="760" height="320" fill="#fcfbf8"/>

  <!-- zero axis -->
  <line x1="380" y1="40" x2="380" y2="280" stroke="#1a1a1a" stroke-width="1.4"/>
  <text x="380" y="300" text-anchor="middle" font-size="12" fill="#74726c">← negative      contribution to max area      positive →</text>

  <!-- positive bars (right of axis): CAPE, deep shear -->
  <g fill="#026234" opacity="0.92">
    <rect x="380" y="60"  width="250" height="34"/>
    <rect x="380" y="110" width="200" height="34"/>
  </g>
  <!-- negative bar (left of axis): neighboring systems -->
  <g fill="#74726c" opacity="0.85">
    <rect x="220" y="180" width="160" height="34"/>
  </g>

  <!-- labels -->
  <g font-size="13" fill="#1a1a1a">
    <text x="640" y="82">pre-storm CAPE</text>
    <text x="590" y="132">deep shear</text>
  </g>
  <g font-size="13" fill="#1a1a1a" text-anchor="end">
    <text x="210" y="202">neighboring systems</text>
  </g>

  <!-- note that directions are the only grounded info -->
  <text x="30" y="30" font-size="12" fill="#74726c">sign of contribution (schematic — directions only, no magnitudes implied)</text>
</svg>
