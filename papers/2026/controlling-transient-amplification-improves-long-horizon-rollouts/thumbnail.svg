<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <line x1="60" y1="320" x2="560" y2="320" stroke="#6f6f78" stroke-width="1.5"/>
  <line x1="60" y1="40"  x2="60"  y2="320" stroke="#6f6f78" stroke-width="1.5"/>
  <!-- diverging (unregularized) rollout: transient amplification -->
  <path d="M60 300 C 180 300, 230 60, 320 70 C 400 80, 460 250, 560 300"
        fill="none" stroke="#026234" stroke-width="2.8"/>
  <!-- bounded (regularized) rollout -->
  <path d="M60 300 C 200 296, 360 290, 560 286"
        fill="none" stroke="#fbfaf7" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="330" y="60" font-family="monospace" font-size="13" fill="#026234">transient</text>
  <text x="430" y="278" font-family="monospace" font-size="13" fill="#fbfaf7">bounded</text>
  <text x="300" y="350" text-anchor="middle" font-family="monospace" font-size="13" fill="#6f6f78">rollout step</text>
</svg>
