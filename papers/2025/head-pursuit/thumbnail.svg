<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <!-- grid of attention heads; a sparse few are "selected" (accent) -->
  <g>
    <!-- inactive heads -->
    <g fill="none" stroke="#3a3a44" stroke-width="1.5">
      <rect x="120" y="70"  width="44" height="44" rx="6"/>
      <rect x="200" y="70"  width="44" height="44" rx="6"/>
      <rect x="280" y="70"  width="44" height="44" rx="6"/>
      <rect x="360" y="70"  width="44" height="44" rx="6"/>
      <rect x="440" y="70"  width="44" height="44" rx="6"/>
      <rect x="120" y="150" width="44" height="44" rx="6"/>
      <rect x="200" y="150" width="44" height="44" rx="6"/>
      <rect x="280" y="150" width="44" height="44" rx="6"/>
      <rect x="360" y="150" width="44" height="44" rx="6"/>
      <rect x="440" y="150" width="44" height="44" rx="6"/>
      <rect x="120" y="230" width="44" height="44" rx="6"/>
      <rect x="200" y="230" width="44" height="44" rx="6"/>
      <rect x="280" y="230" width="44" height="44" rx="6"/>
      <rect x="360" y="230" width="44" height="44" rx="6"/>
      <rect x="440" y="230" width="44" height="44" rx="6"/>
    </g>
    <!-- selected (specialized) heads -->
    <g fill="#026234" fill-opacity="0.22" stroke="#026234" stroke-width="2">
      <rect x="200" y="70"  width="44" height="44" rx="6"/>
      <rect x="440" y="150" width="44" height="44" rx="6"/>
      <rect x="280" y="230" width="44" height="44" rx="6"/>
    </g>
  </g>
  <!-- sparse-selection ring around one head -->
  <circle cx="222" cy="92" r="34" fill="none" stroke="#026234" stroke-width="1.2" opacity="0.6"/>
  <text x="300" y="330" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#fbfaf7">HEAD PURSUIT</text>
</svg>
