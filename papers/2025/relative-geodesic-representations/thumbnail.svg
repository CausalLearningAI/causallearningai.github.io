<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <!-- two latent space frames -->
  <g stroke="#fbfaf7" stroke-width="1.2" fill="none" opacity="0.35">
    <path d="M70 300 L70 110 M70 300 L250 300"/>
    <path d="M350 300 L350 110 M350 300 L530 300"/>
  </g>
  <!-- geodesic curve, space 1 -->
  <path d="M95 270 C140 230 120 190 165 165 S210 135 220 130" stroke="#026234" stroke-width="2" fill="none" opacity="0.9"/>
  <!-- geodesic curve, space 2 (re-parametrized) -->
  <path d="M375 265 C410 200 400 180 445 170 S490 150 500 140" stroke="#026234" stroke-width="2" fill="none" opacity="0.9"/>
  <!-- anchors space 1 -->
  <g fill="#e8a23d">
    <circle cx="120" cy="240" r="4"/><circle cx="180" cy="200" r="4"/>
    <circle cx="155" cy="270" r="4"/><circle cx="210" cy="160" r="4"/>
    <circle cx="100" cy="180" r="4"/>
  </g>
  <!-- anchors space 2 -->
  <g fill="#7b5ea7">
    <circle cx="400" cy="235" r="4"/><circle cx="460" cy="205" r="4"/>
    <circle cx="435" cy="265" r="4"/><circle cx="490" cy="165" r="4"/>
    <circle cx="385" cy="185" r="4"/>
  </g>
  <!-- background sample dots -->
  <g fill="#fbfaf7" opacity="0.45">
    <circle cx="140" cy="160" r="1.7"/><circle cx="200" cy="250" r="1.7"/><circle cx="115" cy="215" r="1.7"/>
    <circle cx="225" cy="220" r="1.7"/><circle cx="165" cy="135" r="1.7"/>
    <circle cx="420" cy="160" r="1.7"/><circle cx="480" cy="250" r="1.7"/><circle cx="395" cy="215" r="1.7"/>
    <circle cx="505" cy="220" r="1.7"/><circle cx="445" cy="135" r="1.7"/>
  </g>
  <!-- transformation arrow T -->
  <g stroke="#fbfaf7" stroke-width="1.5" fill="#fbfaf7" opacity="0.8">
    <line x1="270" y1="205" x2="330" y2="205"/>
    <path d="M330 205 l-9 -5 l0 10 z" stroke="none"/>
  </g>
  <text x="300" y="195" text-anchor="middle" font-family="monospace" font-size="20" fill="#fbfaf7" opacity="0.9">T</text>
  <!-- shared manifold cap -->
  <path d="M210 80 Q300 30 390 80" stroke="#026234" stroke-width="1.5" fill="none" opacity="0.7"/>
  <text x="300" y="60" text-anchor="middle" font-family="monospace" font-size="15" fill="#fbfaf7" opacity="0.6">Y</text>
</svg>
