<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <!-- discretized space-time grid -->
  <g stroke="#3a3a45" stroke-width="1">
    <path d="M120 70 H480 M120 130 H480 M120 190 H480 M120 250 H480 M120 310 H480"/>
    <path d="M120 70 V310 M180 70 V310 M240 70 V310 M300 70 V310 M360 70 V310 M420 70 V310 M480 70 V310"/>
  </g>
  <!-- a wave / shock propagating across the grid -->
  <path d="M120 250 Q180 110 240 250 T360 250 Q420 110 480 250"
        fill="none" stroke="#026234" stroke-width="2.5" opacity="0.9"/>
  <!-- nodes on the grid -->
  <g fill="#fbfaf7">
    <circle cx="180" cy="190" r="3"/>
    <circle cx="240" cy="130" r="3"/>
    <circle cx="300" cy="190" r="3"/>
    <circle cx="360" cy="250" r="3"/>
    <circle cx="420" cy="190" r="3"/>
  </g>
  <!-- recovered governing equation, schematic -->
  <text x="300" y="350" text-anchor="middle" fill="#cfcfd6"
        font-family="'JetBrains Mono', monospace" font-size="22"
        font-style="italic">u&#8348; = c(x,t)&#8201;u&#8339;&#8339;</text>
</svg>
