<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <!-- dense matrix (left): fully filled, cubic cost -->
  <g transform="translate(70 110)">
    <rect x="0" y="0" width="160" height="160" fill="none" stroke="#6f6f78" stroke-width="1.5"/>
    <g fill="#6f6f78" opacity="0.55">
      <rect x="0" y="0" width="160" height="160"/>
    </g>
    <text x="80" y="195" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="15" fill="#fbfaf7">dense</text>
    <text x="80" y="216" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#6f6f78">O(T³)</text>
  </g>
  <!-- arrow -->
  <g stroke="#026234" stroke-width="2.5" fill="none">
    <line x1="255" y1="190" x2="335" y2="190"/>
    <polyline points="322,180 338,190 322,200"/>
  </g>
  <!-- banded matrix (right): only the diagonal band filled, linear cost -->
  <g transform="translate(370 110)">
    <rect x="0" y="0" width="160" height="160" fill="none" stroke="#6f6f78" stroke-width="1.5"/>
    <g fill="#026234">
      <rect x="0"   y="0"   width="40" height="40"/>
      <rect x="40"  y="0"   width="40" height="40" opacity="0.55"/>
      <rect x="0"   y="40"  width="40" height="40" opacity="0.55"/>
      <rect x="40"  y="40"  width="40" height="40"/>
      <rect x="80"  y="40"  width="40" height="40" opacity="0.55"/>
      <rect x="40"  y="80"  width="40" height="40" opacity="0.55"/>
      <rect x="80"  y="80"  width="40" height="40"/>
      <rect x="120" y="80"  width="40" height="40" opacity="0.55"/>
      <rect x="80"  y="120" width="40" height="40" opacity="0.55"/>
      <rect x="120" y="120" width="40" height="40"/>
    </g>
    <text x="80" y="195" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="15" fill="#fbfaf7">banded</text>
    <text x="80" y="216" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#026234">O(T)</text>
  </g>
  <text x="300" y="58" text-anchor="middle" font-family="Newsreader, serif" font-size="22" fill="#fbfaf7">Scalable Mechanistic Neural Networks</text>
</svg>
