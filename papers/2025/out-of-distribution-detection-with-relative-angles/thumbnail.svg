<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#16161d"/>
  <!-- decision boundary -->
  <line x1="430" y1="40" x2="500" y2="340" stroke="#6f6f78" stroke-width="1.5" stroke-dasharray="2 5"/>
  <!-- triangle: mu_ID (bottom), z (top), z_db (on boundary) -->
  <g stroke="#fbfaf7" stroke-width="1.8" fill="none">
    <line x1="200" y1="300" x2="240" y2="120"/>
    <line x1="200" y1="300" x2="455" y2="190"/>
  </g>
  <line x1="240" y1="120" x2="455" y2="190" stroke="#fbfaf7" stroke-width="1.4" stroke-dasharray="6 5"/>
  <!-- angle arc at mu_ID -->
  <path d="M222 254 A 58 58 0 0 1 258 290" fill="none" stroke="#026234" stroke-width="2.4"/>
  <!-- ID cluster (left) -->
  <g fill="#026234">
    <circle cx="120" cy="120" r="5"/><circle cx="150" cy="100" r="5"/>
    <circle cx="175" cy="135" r="5"/><circle cx="110" cy="160" r="5"/>
    <circle cx="145" cy="150" r="5"/><circle cx="90" cy="135" r="5"/>
  </g>
  <!-- OOD cluster (right of boundary) -->
  <g fill="#6f6f78">
    <rect x="510" y="270" width="9" height="9"/><rect x="535" y="255" width="9" height="9"/>
    <rect x="525" y="295" width="9" height="9"/><rect x="555" y="280" width="9" height="9"/>
  </g>
  <!-- key vertices -->
  <g fill="#fbfaf7">
    <circle cx="240" cy="120" r="4.5"/>
    <circle cx="455" cy="190" r="4"/>
    <circle cx="200" cy="300" r="4.5"/>
  </g>
</svg>
